<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niko</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Full viewport tiling workspace -->
    <div id="workspace" class="tiling-workspace">
        <!-- Windows are now managed by js/tiling.js -->
        <div class="generic-window-window window-entry" id="win-1">
            <main class="generic-window-editor">
                <div class="code-area"></div>
            </main>
        </div>
        <div class="generic-window-window window-entry" id="win-2">
            <main class="generic-window-editor">
                <div class="code-area"></div>
            </main>
        </div>
        <div class="generic-window-window window-entry" id="win-3">
            <main class="generic-window-editor">
                <div class="code-area"></div>
            </main>
        </div>
        <div class="generic-window-window window-entry" id="win-4">
            <main class="generic-window-editor">
                <div class="code-area"></div>
            </main>
        </div>
    </div>

    <!-- Container for future content below the fold -->
    <div class="content-below">
        <!-- More content can be added here -->
    </div>

    <script src="js/tiling.js"></script>
</body>
</html>

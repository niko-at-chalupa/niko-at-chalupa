                </div>

        </div>
        <div class="generic-window-window window-entry" id="win-2">

                <div class="code-area">
                    <span style="color: #6e738d;">pending better content!!</span>
                </div>
            </main>
        </div>
        <div class="generic-window-window window-entry" id="win-3">

                    <span style="color: #6e738d;">pending better content!!</span>
                </div>
            </main>
        </div>

                <div class="terminal-line"><span class="prompt">niko@chalupa</span>:<span class="path">~</span>$ <span class="cursor"></span></div>
                <span style="color: #6e738d;">pending better content!!</span>

        </div>
    </div>

    <!-- Container for future content below the fold -->
